<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account map (test / accounts.json)</title>

<!--
  ===================================================================
  ACCOUNT MAP  —  LOCAL TEST BUILD (reads accounts.json)
  ===================================================================
  WHAT THIS IS:
    A standalone copy of the CRM account map for testing WITHOUT Zoho.
    Instead of pulling records through the Zoho SDK, it loads a static
    accounts.json file. Everything else — sidebar, filters, colouring,
    popups, render loop — is identical to the live SDK version, so what
    you see here is what you get in the widget.

  HOW IT DIFFERS FROM THE LIVE (SDK) VERSION:
    - No Zoho SDK <script>, and no ZOHO.embeddedApp lifecycle.
    - fetchAccounts() does fetch('accounts.json') instead of a CRM call.
    - Bootstraps with a plain init() that runs immediately.
    - FIELD_COLOR is already set to Account_Strength here.

  HOW TO RUN IT:
    fetch() is blocked on file:// URLs, so don't double-click this file.
    Serve the folder over HTTP, e.g. in the folder run:  py -m http.server
    then open  http://localhost:8000/index-json.html

  HOW IT FLOWS:
    init() -> build sidebar -> fetch accounts.json -> filter+draw ->
    zoom to fit. After that it's reactive: any dropdown change re-runs
    the filter and redraws the pins.

  THE ONE CLEVER BIT:
    The FILTERS array is declarative. Each entry's "type" decides both
    how its dropdown is built AND how it matches, so adding a filter is
    a data change, not new UI code.
  ===================================================================
-->

<!-- Leaflet: the open-source map library (CSS first, then JS). -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- NOTE: the Zoho SDK is intentionally absent. Data comes from accounts.json. -->

<style>
  /* Full-height app: a flex row of [fixed sidebar | flexible map]. */
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,sans-serif}
  .wrap{display:flex;height:100%}
  /* Sidebar: fixed width, scrolls independently if filters overflow. */
  .sidebar{width:300px;flex-shrink:0;background:#f7f8fa;border-right:1px solid #e2e6ee;overflow-y:auto;padding:16px;box-sizing:border-box}
  .sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#444;margin:0 0 4px}
  .count{font-size:12px;color:#555;margin:0 0 14px}
  .count b{color:#1a1a2e}
  /* One filter group = label + dropdown. */
  .fg{margin-bottom:10px}
  .fg label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:3px}
  .fg select{width:100%;padding:6px 8px;border:1px solid #cdd3df;border-radius:6px;font-size:13px;background:#fff;box-sizing:border-box}
  #reset{width:100%;margin-top:8px;padding:8px;border:1px solid #cdd3df;border-radius:6px;background:#eef1f7;font-weight:600;cursor:pointer}
  #reset:hover{background:#e2e7f1}
  /* Map fills the remaining width. Needs an explicit height to render. */
  #map{flex:1;height:100%}
  /* Floating status/error box over the map (load progress, failures). */
  #status{position:absolute;top:8px;left:316px;z-index:1000;background:#fff;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;max-width:60vw}
  #status.err{background:#fdecea;border-color:#c62828;color:#7a1c1c}
  /* Popup shown when a pin is clicked. */
  .popup-inner{font:13px/1.45 system-ui,sans-serif;min-width:180px}
  .popup-inner h4{margin:0 0 4px;font-size:14px;color:#1a1a2e}
  .popup-inner div{margin:2px 0}
  .popup-inner .addr{color:#555;font-size:12px;margin:2px 0 6px}
</style>
</head>
<body>
<!-- Layout skeleton. #filters is filled in by JS from the FILTERS array;
     it is deliberately empty here. -->
<div class="wrap">
  <div class="sidebar">
    <h2>Filters</h2>
    <div class="count">Showing <b id="count">0</b> accounts</div>
    <div id="filters"></div>
    <button id="reset">Reset filters</button>
  </div>
  <div id="map"></div>
</div>
<div id="status">Starting…</div>

<script>
// =====================================================================
// CONFIG  —  the only block you normally edit.
// =====================================================================
const DATA_URL      = "accounts.json";      // test data source (replaces the Zoho SDK call)

// Map your CRM field API names onto names the code uses. Nothing below
// hardcodes a field, so renaming a field is a one-line change here.
const FIELD_LAT     = "Billing_Latitude";   // latitude (account is only mapped if this and lng are present)
const FIELD_LNG     = "Billing_Longitude";  // longitude
const FIELD_NAME    = "Account_Name";       // shown as the popup title and pin tooltip
const FIELD_COLOR   = "Account_Strength";   // drives pin colour (Very Low..Very High)
const FIELD_REVENUE = "Total_Business";     // shown in the popup
const FIELD_WINLOSS = "Win_Loss_Percentage";// shown in the popup
// Billing address parts shown in the popup, in order. Blank parts are skipped.
const FIELD_ADDRESS = ["Billing_Street","Billing_City","Billing_State","Billing_Code","Billing_Country"];

// Maps each Account Strength value to a pin colour. "_default" is the
// fallback for anything unrecognised (rendered grey).
const COLORS = {
  "Very Low":"#2e7d32","Low":"#7cb342","Moderate":"#f9a825",
  "High":"#ef6c00","Very High":"#c62828","_default":"#9e9e9e"
};

// ---- FILTER DEFINITIONS ---------------------------------------------
// Each object = one dropdown. "type" controls BOTH how the dropdown is
// built (buildSidebar) and how it filters (matches). Four types:
//   category : distinct values are read from the data at runtime
//   range    : numeric value must fall inside a chosen band
//   count    : exact-count buckets 0,1,2,3,4,5+ (5+ means >= 5)
//   derived  : value is computed per-account by a derive() function
// Range bands below are sensible defaults — edit min/max to taste.
const FILTERS = [
  // "Active" isn't a stored field. It's computed: an account is Active
  // if it has at least one open deal (a deal that's neither won nor
  // lost), i.e. total deals minus the won and lost rollups is > 0.
  { id:"f-active", label:"Status", type:"derived", options:["Active","Non-active"],
    derive: a => ((Number(a.Total_Deals)||0) - (Number(a.Total_Deals_WON)||0) - (Number(a.Total_Deals_LOST)||0)) > 0 ? "Active" : "Non-active" },

  // Picklists: options auto-populate from whatever values exist in the data.
  { id:"f-industry", label:"Industry",        field:"Industry",       type:"category" },
  { id:"f-type",     label:"Account Type",    field:"Account_Type",   type:"category" },

  // Currency: banded into ranges. max is exclusive (see matches()).
  { id:"f-annrev",   label:"Annual Revenue",  field:"Annual_Revenue", type:"range", bands:[
      {label:"< £100k", min:-Infinity, max:100000}, {label:"£100k – £500k", min:100000, max:500000},
      {label:"£500k – £1M", min:500000, max:1000000}, {label:"£1M – £5M", min:1000000, max:5000000},
      {label:"£5M+", min:5000000, max:Infinity} ] },

  // Employee head-count bands.
  { id:"f-emp",      label:"Employees",       field:"Employees",      type:"range", bands:[
      {label:"1 – 10", min:1, max:11}, {label:"11 – 50", min:11, max:51},
      {label:"51 – 200", min:51, max:201}, {label:"201 – 500", min:201, max:501},
      {label:"500+", min:501, max:Infinity} ] },

  // Deal-count rollups: exact buckets. Empty/null counts as 0.
  { id:"f-deals",    label:"Total Deals",     field:"Total_Deals",     type:"count" },
  { id:"f-won",      label:"Total Deals Won", field:"Total_Deals_WON", type:"count" },
  { id:"f-lost",     label:"Total Deals Lost",field:"Total_Deals_LOST",type:"count" },

  // Won-revenue rollup, banded.
  { id:"f-business", label:"Total Business",  field:"Total_Business",  type:"range", bands:[
      {label:"< £10k", min:-Infinity, max:10000}, {label:"£10k – £50k", min:10000, max:50000},
      {label:"£50k – £250k", min:50000, max:250000}, {label:"£250k – £1M", min:250000, max:1000000},
      {label:"£1M+", min:1000000, max:Infinity} ] },

  // Win/Loss percentage, banded 0–100.
  { id:"f-winloss",  label:"Win/Loss %",      field:"Win_Loss_Percentage", type:"range", bands:[
      {label:"0 – 20%", min:0, max:21}, {label:"21 – 40%", min:21, max:41},
      {label:"41 – 60%", min:41, max:61}, {label:"61 – 80%", min:61, max:81},
      {label:"81 – 100%", min:81, max:Infinity} ] },
];
// =====================================================================
// END CONFIG
// =====================================================================


// ---- Status box helpers ---------------------------------------------
const statusEl = document.getElementById("status");
function setStatus(m, err){ statusEl.textContent = m; statusEl.className = err ? "err" : ""; } // err=true turns it red
function hideStatus(){ statusEl.style.display = "none"; }                                       // called once everything loads

// ---- Small generic helpers ------------------------------------------
// Escape text before putting it into HTML (popup titles etc.) so a stray
// & < > " in the data can't break or inject markup.
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g,
  c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
// Format a number as GBP for the popup; if it isn't a number, show it as-is.
function fmtMoney(v){ const n = Number(v); return isNaN(n) ? esc(String(v)) : "£" + n.toLocaleString("en-GB"); }
// Parse to a number, or return null if it isn't numeric. Note Number("")
// and Number(null) are 0 (not NaN), so blanks become 0, not null.
function valNum(v){ const n = Number(v); return isNaN(n) ? null : n; }

// Pick a pin colour for an account's strength value. Trims + lowercases
// both sides so "very high", "Very High " etc. all still match — this is
// what prevents the "all pins grey" bug from minor data inconsistencies.
function colorFor(v){
  const key = String(v == null ? "" : v).trim().toLowerCase();
  const m = Object.keys(COLORS).find(k => k.toLowerCase() === key);
  return m ? COLORS[m] : COLORS._default;
}

// Build a coloured teardrop pin as an inline SVG. Using a divIcon (HTML,
// not an image file) is how the fill colour can vary per pin. iconAnchor
// puts the tip of the teardrop on the exact coordinate.
function pinIcon(color){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">`
    + `<path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24s12-15 12-24C24 5.37 18.63 0 12 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/>`
    + `<circle cx="12" cy="12" r="5" fill="#fff" opacity="0.9"/></svg>`;
  return L.divIcon({ html: svg, className: "", iconSize:[24,36], iconAnchor:[12,36], popupAnchor:[0,-36] });
}

// Build the popup HTML for one account. Only adds a row if the field has
// a value, so empty fields don't show blank lines.
function popupHtml(a){
  const rows = [];
  // Billing address: present parts only, joined in order under the title.
  const parts = FIELD_ADDRESS.map(f => a[f]).filter(v => v != null && String(v).trim() !== "");
  const addr = parts.length ? `<div class="addr">${parts.map(esc).join(", ")}</div>` : "";
  if (a[FIELD_REVENUE] != null && a[FIELD_REVENUE] !== "")
    rows.push(`<div>Total Revenue: <b>${fmtMoney(a[FIELD_REVENUE])}</b></div>`);
  if (a[FIELD_WINLOSS] != null && a[FIELD_WINLOSS] !== "")
    rows.push(`<div>Win/Loss Ratio: <b>${esc(String(a[FIELD_WINLOSS]))}%</b></div>`);
  return `<div class="popup-inner"><h4>${esc(a[FIELD_NAME])}</h4>${addr}${rows.join("")}</div>`;
}

// ---- Build the filter controls from the FILTERS array ---------------
function buildSidebar(){
  // For each filter, generate its <option>s based on type, then inject
  // the <label> + <select> into the sidebar.
  document.getElementById("filters").innerHTML = FILTERS.map(f => {
    let opts = '<option value="">All</option>';                       // "" = no filter applied
    if(f.type === "count")
      opts += [0,1,2,3,4].map(n => `<option value="${n}">${n}</option>`).join("") + `<option value="5+">5+</option>`;
    else if(f.type === "range")
      opts += f.bands.map((b,i) => `<option value="${i}">${b.label}</option>`).join(""); // value = band index
    else if(f.type === "derived")
      opts += f.options.map(o => `<option value="${o}">${o}</option>`).join("");
    // category options are added later by fillCategories() once data is loaded
    return `<div class="fg"><label for="${f.id}">${f.label}</label><select id="${f.id}">${opts}</select></div>`;
  }).join("");

  // Any dropdown change re-applies all filters. Reset clears them all.
  FILTERS.forEach(f => document.getElementById(f.id).addEventListener("change", applyFilters));
  document.getElementById("reset").addEventListener("click", () => {
    FILTERS.forEach(f => document.getElementById(f.id).value = "");
    applyFilters();
  });
}

// Populate the category dropdowns (Industry, Account Type) with the
// distinct values actually present in the data, sorted. This is why
// those lists always match reality without being hardcoded.
function fillCategories(accounts){
  FILTERS.filter(f => f.type === "category").forEach(f => {
    const vals = [...new Set(accounts.map(a => String(a[f.field]==null?"":a[f.field]).trim()).filter(Boolean))].sort();
    document.getElementById(f.id).insertAdjacentHTML("beforeend",
      vals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join(""));
  });
}

// ---- Does one account pass ALL active filters? ----------------------
// Returns false on the first filter it fails (filters combine with AND).
function matches(a){
  for(const f of FILTERS){
    const sel = document.getElementById(f.id).value;
    if(sel === "") continue;          // "All" selected -> this filter is inactive
    const raw = a[f.field];           // (unused by the derived type, which reads the whole account)
    if(f.type === "category"){
      if(String(raw==null?"":raw).trim() !== sel) return false;
    } else if(f.type === "count"){
      const n = valNum(raw) ?? 0;     // blank/non-numeric counts as 0
      if(sel === "5+"){ if(!(n >= 5)) return false; }
      else if(n !== Number(sel)) return false;
    } else if(f.type === "range"){
      const n = valNum(raw);
      if(n === null) return false;    // a non-numeric value matches no band, so it's filtered out
      const b = f.bands[Number(sel)];
      if(!(n >= b.min && n < b.max)) return false; // min inclusive, max exclusive
    } else if(f.type === "derived"){
      if(f.derive(a) !== sel) return false; // compare the computed label to the selection
    }
  }
  return true;
}

// ---- Leaflet map setup ----------------------------------------------
const map = L.map("map", { center:[51.13,-0.1], zoom:6 }); // initial view ~ South-East England
// CartoDB "light" tiles: free, keyless, muted basemap. {s}=subdomain,
// {z}/{x}/{y}=tile coords, {r}=@2x for retina screens.
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:19
}).addTo(map);
// All pins live in this one layer group, so a filter change can wipe and
// redraw them with a single clearLayers() call.
const markerLayer = L.layerGroup().addTo(map);

// ---- Resolve an account to a map position ---------------------------
// Coordinates only. Returns null if either lat or lng is missing or
// non-numeric, in which case the account simply isn't drawn.
function getPos(a){
  const lat = parseFloat(a[FIELD_LAT]), lng = parseFloat(a[FIELD_LNG]);
  if(!isNaN(lat) && !isNaN(lng)) return {lat,lng};
  return null;
}

// ---- Data fetch, render, filter -------------------------------------
let allAccounts = [];   // the full loaded set; filtering works on a copy of this

// Load the static JSON file instead of calling the Zoho SDK. Accepts
// either a bare array or a { "data": [...] } wrapper (the SDK's shape).
// Then drops any account without usable coordinates.
async function fetchAccounts(){
  const res = await fetch(DATA_URL, { cache: "no-store" });
  if(!res.ok) throw new Error(`Could not load ${DATA_URL} (HTTP ${res.status})`);
  const json = await res.json();
  const rows = Array.isArray(json) ? json : (json.data || []);
  return rows.filter(a=>
    a[FIELD_LAT]!=null && a[FIELD_LAT]!=="" && a[FIELD_LNG]!=null && a[FIELD_LNG]!=="");
}

// Wipe existing pins and draw one per account that has a position.
function renderMarkers(accounts){
  markerLayer.clearLayers();
  accounts.forEach(a=>{
    const pos=getPos(a); if(!pos) return;
    L.marker([pos.lat,pos.lng],{icon:pinIcon(colorFor(a[FIELD_COLOR])),title:a[FIELD_NAME]||""})
      .bindPopup(popupHtml(a)).addTo(markerLayer);
  });
}

// The reactive core: filter the full set, redraw, update the count.
// Runs on first load and on every dropdown change.
function applyFilters(){
  const filtered = allAccounts.filter(matches);
  renderMarkers(filtered);
  document.getElementById("count").textContent = filtered.length;
}

// ---- Bootstrap ------------------------------------------------------
// Plain async startup (no Zoho lifecycle). Runs immediately because the
// script sits at the end of <body>, so the DOM already exists.
async function init(){
  try{
    buildSidebar();                            // 1. render the (mostly empty) dropdowns
    setStatus("Loading accounts…");
    allAccounts = await fetchAccounts();       // 2. load accounts.json
    fillCategories(allAccounts);               // 3. fill Industry/Account Type options from the data

    applyFilters();                            // 4. first draw (no filters selected = everything)

    // 5. Zoom to contain all plottable accounts — done ONCE on load so
    //    later filtering doesn't keep jerking the viewport around.
    const pts=[]; allAccounts.forEach(a=>{const p=getPos(a); if(p) pts.push([p.lat,p.lng]);});
    if(pts.length){ map.fitBounds(pts,{padding:[30,30]}); hideStatus(); }
    else setStatus(`Loaded ${allAccounts.length} records, but none had coordinates to plot.`,true);
  }catch(e){ setStatus("Failed: "+e.message,true); console.error(e); } // surface any error in the status box
}
init();
</script>
</body>
</html>
