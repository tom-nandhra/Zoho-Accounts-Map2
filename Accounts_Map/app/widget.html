<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Account map (Zoho SDK)</title>
<style>html,body,#map{height:100%;margin:0}</style>
<script src="https://live.zwidgets.com/js-sdk/1.0.5/ZohoEmbededAppSDK.min.js"></script>
</head>
<body>
<div id="map"></div>
<script>
const GMAPS_KEY = "AIzaSyDpqFgQ-7NwTGSUXAiZSs4fLVKoDd_khFk";
const FIELD_LAT="Billing_Latitude", FIELD_LNG="Billing_Longitude",
      FIELD_COLOR="Account_Strength", FIELD_DESC="Description";
const COLORS = {
  "Very Low":  "#2e7d32",
  "Low":       "#7cb342",
  "Moderate":  "#f9a825",
  "High":      "#ef6c00",
  "Very High": "#c62828",
  "_default":  "#9e9e9e"
};
//const COLORS = { "Red":"#c62828","Amber":"#f9a825","Green":"#2e7d32","_default":"#9e9e9e" };

let accounts = [];
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function fetchAccounts(){
  let page=1, out=[];
  while(true){
    const r = await ZOHO.CRM.API.getAllRecords({ Entity:"Accounts", per_page:200, page });
    const rows = (r && r.data) || [];
    out = out.concat(rows);
    if(rows.length < 200) break;
    page++;
  }
  return out.filter(a => a[FIELD_LAT]!=null && a[FIELD_LAT]!=="" && a[FIELD_LNG]!=null && a[FIELD_LNG]!=="");
}

function infoHtml(a){
  const d = a[FIELD_DESC] ? `<div style="margin-top:4px">${esc(a[FIELD_DESC])}</div>` : "";
  return `<div style="font:13px/1.45 system-ui,sans-serif;max-width:280px">`
       + `<div style="font-weight:600;font-size:14px">${esc(a.Account_Name||"")}</div>${d}</div>`;
}

async function initMap(){
  const { Map } = await google.maps.importLibrary("maps");
  const { AdvancedMarkerElement, PinElement } = await google.maps.importLibrary("marker");
  const map = new Map(document.getElementById("map"),{center:{lat:51.13,lng:-0.1},zoom:6,mapId:"7492dafd828ff08faf4f40a5"});
  const shared = new google.maps.InfoWindow();
  const bounds = new google.maps.LatLngBounds();
  let plotted=0;
  accounts.forEach(a=>{
    const lat=parseFloat(a[FIELD_LAT]), lng=parseFloat(a[FIELD_LNG]);
    if(isNaN(lat)||isNaN(lng)) return;
    const pos={lat,lng};
    const color=COLORS[a[FIELD_COLOR]]||COLORS._default;
    const pin=new PinElement({background:color,borderColor:"#000",glyphColor:"#fff"});
    const marker=new AdvancedMarkerElement({map,position:pos,title:a.Account_Name||"",content:pin.element});
    marker.addListener("gmp-click",()=>{shared.setContent(infoHtml(a));shared.open({map,anchor:marker});});
    bounds.extend(pos); plotted++;
  });
  if(plotted) map.fitBounds(bounds);
}
window.initMap = initMap;

function loadGoogleMaps(){
  const s=document.createElement("script");
  s.src=`https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&loading=async&libraries=marker&callback=initMap`;
  document.head.appendChild(s);
}

ZOHO.embeddedApp.on("PageLoad", async () => {
  try { accounts = await fetchAccounts(); }
  catch(e){ console.error("Account fetch failed", e); accounts = []; }
  loadGoogleMaps();
});
ZOHO.embeddedApp.init();
</script>
</body>
</html>
