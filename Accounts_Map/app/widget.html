<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account map</title>

<!--
  ===================================================================
  ZOHO CRM ACCOUNT MAP  —  Leaflet widget (externally hosted)
  ===================================================================
  WHAT THIS IS:
    A single-file widget that plots Account records from Zoho CRM on a
    map, coloured by open-pipeline value, with a sidebar of filters.
    It is hosted outside Zoho (e.g. GitHub Pages) and registered as a
    CRM Widget; the Zoho JS SDK lets it read CRM data live, inheriting
    the logged-in user's session (so no API key and no data sits in
    this file).

  HOW IT FLOWS (top to bottom is NOT execution order):
    1. The three <script>/<link> tags load Leaflet + the Zoho SDK.
    2. Nothing meaningful runs until ZOHO.embeddedApp.init() (bottom of
       file) completes the handshake with Zoho and fires "PageLoad".
    3. Inside PageLoad: build sidebar -> fetch accounts -> filter+draw
       -> zoom to fit.
    4. After that it's reactive: changing any dropdown re-runs the
       filter and redraws the pins.

  THE ONE CLEVER BIT:
    The FILTERS array is declarative. Each entry's "type" decides both
    how its dropdown is built AND how it matches. So adding a filter is
    a data change, not new UI code.
  ===================================================================
-->

<!-- Leaflet: the open-source map library (CSS first, then JS). -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Zoho Embedded App SDK: the bridge that lets this externally-hosted
     page read/write the CRM it is embedded in. Exposes the global ZOHO. -->
<script src="https://live.zwidgets.com/js-sdk/1.0.5/ZohoEmbededAppSDK.min.js"></script>

<style>
  /* Full-height app: a flex row of [fixed sidebar | flexible map]. */
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,sans-serif}
  .wrap{display:flex;height:100%}
  /* Sidebar: fixed width, scrolls independently if filters overflow. */
  .sidebar{width:300px;flex-shrink:0;background:#f7f8fa;border-right:1px solid #e2e6ee;overflow-y:auto;padding:16px;box-sizing:border-box}
  .sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#444;margin:0 0 4px}
  .count{font-size:12px;color:#555;margin:0 0 14px}
  .count b{color:#1a1a2e}
  /* One filter group = label + dropdown. */
  .fg{margin-bottom:10px}
  .fg label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:3px}
  .fg select{width:100%;padding:6px 8px;border:1px solid #cdd3df;border-radius:6px;font-size:13px;background:#fff;box-sizing:border-box}
  #reset{width:100%;margin-top:8px;padding:8px;border:1px solid #cdd3df;border-radius:6px;background:#eef1f7;font-weight:600;cursor:pointer}
  #reset:hover{background:#e2e7f1}
  /* "Show more options" expander toggle. */
  #more-toggle{width:100%;margin:2px 0 8px;padding:6px 0;border:none;background:none;color:#2a6fb0;font-weight:600;font-size:12px;cursor:pointer;text-align:left}
  #more-toggle:hover{text-decoration:underline}
  #adv-filters[hidden]{display:none}
  /* Map fills the remaining width. Needs an explicit height to render. */
  #map{flex:1;height:100%}
  /* Floating status/error box over the map (load progress, failures). */
  #status{position:absolute;top:8px;left:316px;z-index:1000;background:#fff;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;max-width:60vw}
  #status.err{background:#fdecea;border-color:#c62828;color:#7a1c1c}
  /* Hover tooltip uses Leaflet's default styling. */
  /* Right-hand detail panel (opens when a pin is clicked). */
  #detail{width:340px;flex-shrink:0;background:#fff;border-left:1px solid #e2e6ee;overflow-y:auto;box-sizing:border-box;font-size:13px}
  #detail[hidden]{display:none}
  .d-head{position:sticky;top:0;background:#fff;border-bottom:1px solid #eef0f4;padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .d-head h3{margin:0;font-size:15px;color:#1a1a2e;line-height:1.3}
  .d-close{border:none;background:none;font-size:20px;line-height:1;cursor:pointer;color:#9aa1ab;padding:0}
  .d-close:hover{color:#333}
  .d-sec{padding:14px 16px;border-bottom:1px solid #f2f4f7}
  .d-sec h4{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#5a6472}
  .d-row{display:flex;justify-content:space-between;gap:12px;margin:6px 0}
  .d-k{color:#7a838f;flex-shrink:0}
  .d-v{color:#1a1a2e;text-align:right;font-weight:500;word-break:break-word}
  .d-pill{display:inline-block;padding:2px 10px;border-radius:12px;background:#f3954d;color:#fff;font-weight:600;font-size:12px}
  .d-deal{padding:8px 0;border-bottom:1px solid #f4f6f8}
  .d-deal:last-child{border-bottom:none}
  .d-deal-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .d-deal-name{font-weight:600;color:#1a1a2e}
  .d-deal-amt{flex-shrink:0;background:#e9f2fb;color:#1c5fa8;border-radius:6px;padding:1px 8px;font-weight:600;font-size:12px}
  .d-deal-sub{color:#7a838f;font-size:12px;margin-top:2px}
  .d-empty{color:#9aa1ab;font-style:italic}
  .d-link{color:#2a6fb0;cursor:pointer}
  .d-link:hover{text-decoration:underline}
</style>
</head>
<body>
<!-- Layout skeleton. #filters is filled in by JS from the FILTERS array;
     it is deliberately empty here. -->
<div class="wrap">
  <div class="sidebar">
    <h2>Filters</h2>
    <div class="count">Showing <b id="count">0</b> accounts</div>
    <div id="filters"></div>
    <button id="reset">Reset filters</button>
  </div>
  <div id="map"></div>
  <aside id="detail" hidden></aside>
</div>
<div id="status">Starting…</div>

<script>
// =====================================================================
// CONFIG  —  the only block you normally edit.
// =====================================================================
// Map your CRM field API names onto names the code uses. Nothing below
// hardcodes a field, so renaming a field is a one-line change here.
const FIELD_LAT     = "Billing_Latitude";   // latitude (account is only mapped if this and lng are present)
const FIELD_LNG     = "Billing_Longitude";  // longitude
const FIELD_NAME    = "Account_Name";       // shown as the popup title and pin tooltip
const FIELD_REVENUE = "Total_Business";     // shown in the popup
const FIELD_WINLOSS = "Win_Loss_Percentage";// shown in the popup
// Billing address parts shown in the popup, in order. Blank parts are skipped.
const FIELD_ADDRESS = ["Billing_Street","Billing_City","Billing_State","Billing_Code","Billing_Country"];

// ---- PIN COLOUR: by OPEN PIPELINE value ------------------------------
// Each pin is coloured by the account's "open pipeline" = the sum of
// Amount across that account's deals whose Stage is NOT one of the closed
// stages below. This is computed live from the Deals module on load
// (see fetchDealsByAccount) and stored on each account as
// a._openPipeline.
//
// Stages treated as closed (excluded from the sum). Adjust if your CRM
// uses different stage names:
const CLOSED_STAGES = ["Closed Won","Closed Lost","Closed Lost to Competition"];
// Deal field API names used for the aggregation:
const FIELD_DEAL_STAGE   = "Stage";
const FIELD_DEAL_AMOUNT  = "Amount";
const FIELD_DEAL_ACCOUNT = "Account_Name";  // lookup on Deals back to Accounts
const FIELD_DEAL_NAME    = "Deal_Name";     // shown in the detail panel's deal list
const FIELD_DEAL_DATE    = "Closing_Date";  // shown in the detail panel's deal list
// Colour bands (ascending by `min`, in £). An account gets the colour of
// the highest band whose `min` its pipeline value reaches. £0 = grey.
// Edit thresholds/colours freely; `label` is for a legend if you add one.
const PIPELINE_BANDS = [
  { min: 0,      color:"#bdbdbd", label:"No open pipeline" },
  { min: 1,      color:"#fdae6b", label:"Up to £50k" },
  { min: 50000,  color:"#fd8d3c", label:"£50k – £150k" },
  { min: 150000, color:"#e6550d", label:"£150k – £500k" },
  { min: 500000, color:"#a63603", label:"£500k and over" },
];

// ---- FILTER DEFINITIONS ---------------------------------------------
// Each object = one dropdown. "type" controls BOTH how the dropdown is
// built (buildSidebar) and how it filters (matches). Four types:
//   category : distinct values are read from the data at runtime
//              (optional `order` array sorts them; otherwise alphabetical)
//   range    : numeric value must fall inside a chosen band
//   count    : exact-count buckets 0,1,2,3,4,5+ (5+ means >= 5)
//   derived  : value is computed per-account by a derive() function
// `adv: true` puts a filter under the "Show more options" expander;
// everything else shows by default. Range bands are editable defaults.
const FILTERS = [
  // -------- Basic filters (always visible) --------
  // "Active" isn't a stored field. It's computed: an account is Active
  // if it has at least one open deal (a deal that's neither won nor
  // lost), i.e. total deals minus the won and lost rollups is > 0.
  { id:"f-active", label:"Status", type:"derived", options:["Active","Non-active"],
    derive: a => ((Number(a.Total_Deals)||0) - (Number(a.Total_Deals_WON)||0) - (Number(a.Total_Deals_LOST)||0)) > 0 ? "Active" : "Non-active" },

  // Picklists: options auto-populate from whatever values exist in the data.
  { id:"f-industry", label:"Industry Sector", field:"Industry_Sector", type:"category" },
  { id:"f-type",     label:"Account Type",    field:"Account_Type",   type:"category" },

  // Won-revenue rollup, banded.
  { id:"f-business", label:"Total Business",  field:"Total_Business",  type:"range", bands:[
      {label:"< £10k", min:-Infinity, max:10000}, {label:"£10k – £50k", min:10000, max:50000},
      {label:"£50k – £250k", min:50000, max:250000}, {label:"£250k – £1M", min:250000, max:1000000},
      {label:"£1M+", min:1000000, max:Infinity} ] },

  // -------- Advanced filters (under "Show more options") --------
  // Account Strength picklist, ordered high -> low rather than alphabetical.
  { id:"f-strength", label:"Account Strength", field:"Account_Strength", type:"category", adv:true,
    order:["Very High","High","Moderate","Low","Very Low"] },

  // Currency: banded into ranges. max is exclusive (see matches()).
  { id:"f-annrev",   label:"Annual Revenue",  field:"Annual_Revenue", type:"range", adv:true, bands:[
      {label:"< £100k", min:-Infinity, max:100000}, {label:"£100k – £500k", min:100000, max:500000},
      {label:"£500k – £1M", min:500000, max:1000000}, {label:"£1M – £5M", min:1000000, max:5000000},
      {label:"£5M+", min:5000000, max:Infinity} ] },

  // Deal-count rollups: exact buckets. Empty/null counts as 0.
  { id:"f-deals",    label:"Total Deals",     field:"Total_Deals",     type:"count", adv:true },
  { id:"f-won",      label:"Total Deals Won", field:"Total_Deals_WON", type:"count", adv:true },
  { id:"f-lost",     label:"Total Deals Lost",field:"Total_Deals_LOST",type:"count", adv:true },

  // Employee head-count bands.
  { id:"f-emp",      label:"Employees",       field:"Employees",      type:"range", adv:true, bands:[
      {label:"1 – 10", min:1, max:11}, {label:"11 – 50", min:11, max:51},
      {label:"51 – 200", min:51, max:201}, {label:"201 – 500", min:201, max:501},
      {label:"500+", min:501, max:Infinity} ] },

  // Win/Loss percentage, banded 0–100.
  { id:"f-winloss",  label:"Win/Loss %",      field:"Win_Loss_Percentage", type:"range", adv:true, bands:[
      {label:"0 – 20%", min:0, max:21}, {label:"21 – 40%", min:21, max:41},
      {label:"41 – 60%", min:41, max:61}, {label:"61 – 80%", min:61, max:81},
      {label:"81 – 100%", min:81, max:Infinity} ] },
];
// =====================================================================
// END CONFIG
// =====================================================================


// ---- Status box helpers ---------------------------------------------
const statusEl = document.getElementById("status");
function setStatus(m, err){ statusEl.textContent = m; statusEl.className = err ? "err" : ""; } // err=true turns it red
function hideStatus(){ statusEl.style.display = "none"; }                                       // called once everything loads

// ---- Small generic helpers ------------------------------------------
// Escape text before putting it into HTML (popup titles etc.) so a stray
// & < > " in CRM data can't break or inject markup.
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g,
  c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
// Format a number as GBP for the popup; if it isn't a number, show it as-is.
function fmtMoney(v){ const n = Number(v); return isNaN(n) ? esc(String(v)) : "£" + n.toLocaleString("en-GB"); }
// Parse to a number, or return null if it isn't numeric. Note Number("")
// and Number(null) are 0 (not NaN), so blanks become 0, not null.
function valNum(v){ const n = Number(v); return isNaN(n) ? null : n; }

// Pick a pin colour from an account's open-pipeline value: the colour of
// the highest band whose `min` the value reaches (bands are ascending).
function colorForPipeline(value){
  const v = Number(value) || 0;          // missing/non-numeric -> 0 -> grey
  let c = PIPELINE_BANDS[0].color;
  for(const b of PIPELINE_BANDS){ if(v >= b.min) c = b.color; }
  return c;
}

// Build a coloured teardrop pin as an inline SVG. Using a divIcon (HTML,
// not an image file) is how the fill colour can vary per pin. iconAnchor
// puts the tip of the teardrop on the exact coordinate.
function pinIcon(color){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">`
    + `<path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24s12-15 12-24C24 5.37 18.63 0 12 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/>`
    + `<circle cx="12" cy="12" r="5" fill="#fff" opacity="0.9"/></svg>`;
  return L.divIcon({ html: svg, className: "", iconSize:[24,36], iconAnchor:[12,36], popupAnchor:[0,-36] });
}

// Join an account's present billing-address parts into one string,
// in order, skipping blanks. Returns "" if there's no address at all.
function addressStr(a){
  return FIELD_ADDRESS.map(f => a[f]).filter(v => v != null && String(v).trim() !== "").map(esc).join(", ");
}

// Open-deal count = deals that aren't closed (won/lost), derived from the
// account's rollups. Never negative. Used in the hover tooltip and panel.
function openDealCount(a){
  return Math.max(0, (Number(a.Total_Deals)||0) - (Number(a.Total_Deals_WON)||0) - (Number(a.Total_Deals_LOST)||0));
}

// "YYYY-MM-DD" -> "DD/MM/YYYY" for display; pass anything else through.
function fmtDate(s){
  const m = String(s||"").match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : esc(String(s||""));
}

// ---- Right-hand detail panel ----------------------------------------
// Small formatters: txt() shows a value or an em-dash; look() reads a
// lookup's display name; money() formats currency or em-dash if blank.
function txt(v){ return (v!=null && String(v).trim()!=="") ? esc(String(v)) : "—"; }
function look(v){ return (v && v.name) ? esc(v.name) : "—"; }
function money(v){ return (v!=null && v!=="") ? fmtMoney(v) : "—"; }
function drow(k,v){ return `<div class="d-row"><span class="d-k">${k}</span><span class="d-v">${v}</span></div>`; }

// The Deals list at the top of the panel (newest closing date first).
function dealsHtml(deals){
  if(!deals || !deals.length) return `<div class="d-empty">No deals</div>`;
  return deals.slice().sort((x,y)=>String(y.date||"").localeCompare(String(x.date||""))).map(d => `
    <div class="d-deal">
      <div class="d-deal-top">
        <span class="d-deal-name">${ d.id ? `<span class="d-link" data-entity="Deals" data-id="${esc(d.id)}">${esc(d.name)}</span>` : esc(d.name) }</span>
        <span class="d-deal-amt">${fmtMoney(d.amount)}</span>
      </div>
      <div class="d-deal-sub">${txt(d.stage)}${d.date ? ` · ${fmtDate(d.date)}` : ""}</div>
    </div>`).join("");
}

// Build the full panel markup for one account, mirroring the CRM record:
// Deals, Account Information, and Commercial Summary.
function buildDetail(a){
  const strength = a.Account_Strength
    ? `<span class="d-pill">${esc(a.Account_Strength)}</span>` : "—";
  return `
    <div class="d-head">
      <h3>${ a.id ? `<span class="d-link" data-entity="Accounts" data-id="${esc(a.id)}">${esc(a[FIELD_NAME])}</span>` : esc(a[FIELD_NAME]) }</h3>
      <button class="d-close" id="d-close" title="Close">×</button>
    </div>
    <div class="d-sec">
      <h4>Deals</h4>
      ${dealsHtml(a._deals)}
    </div>
    <div class="d-sec">
      <h4>Account Information</h4>
      ${drow("Account Name", txt(a[FIELD_NAME]))}
      ${drow("Parent Account", look(a.Parent_Account))}
      ${drow("Website", txt(a.Website))}
      ${drow("Industry Sector", txt(a.Industry_Sector))}
      ${drow("Account Strength", strength)}
      ${drow("Account Number", txt(a.Account_Number))}
      ${drow("Account Type", txt(a.Account_Type))}
      ${drow("Phone", txt(a.Phone))}
      ${drow("Annual Revenue", money(a.Annual_Revenue))}
      ${drow("Employees", txt(a.Employees))}
    </div>
    <div class="d-sec">
      <h4>Commercial Summary</h4>
      ${drow("Total Deals", txt(a.Total_Deals != null ? a.Total_Deals : 0))}
      ${drow("Total Business", money(a.Total_Business))}
      ${drow("In Progress", String(openDealCount(a)))}
      ${drow("Pipeline Value", fmtMoney(a._openPipeline || 0))}
      ${drow("Total Deals - WON", txt(a.Total_Deals_WON != null ? a.Total_Deals_WON : 0))}
      ${drow("Total Deals - LOST", txt(a.Total_Deals_LOST != null ? a.Total_Deals_LOST : 0))}
      ${drow("Win/Loss Percentage", txt(a.Win_Loss_Percentage))}
    </div>`;
}

// Open the panel for an account. invalidateSize() lets Leaflet re-render
// after the flex layout resizes the map to make room for the panel.
function openDetail(a){
  const el = document.getElementById("detail");
  el.innerHTML = buildDetail(a);
  el.hidden = false;
  document.getElementById("d-close").addEventListener("click", closeDetail);
  // Account-name and deal-name links open the record inside the CRM.
  el.querySelectorAll(".d-link").forEach(node => node.addEventListener("click", () => {
    ZOHO.CRM.UI.Record.open({ Entity: node.dataset.entity, RecordID: node.dataset.id })
      .catch(e => console.warn("Record.open failed", e));
  }));
  setTimeout(() => map.invalidateSize(), 210);
}
function closeDetail(){
  const el = document.getElementById("detail");
  el.hidden = true;
  el.innerHTML = "";
  setTimeout(() => map.invalidateSize(), 210);
}

// ---- Build the filter controls from the FILTERS array ---------------
// Builds the <option>s for one filter and wraps it in a labelled group.
function filterGroupHtml(f){
  let opts = '<option value="">All</option>';                       // "" = no filter applied
  if(f.type === "count")
    opts += [0,1,2,3,4].map(n => `<option value="${n}">${n}</option>`).join("") + `<option value="5+">5+</option>`;
  else if(f.type === "range")
    opts += f.bands.map((b,i) => `<option value="${i}">${b.label}</option>`).join(""); // value = band index
  else if(f.type === "derived")
    opts += f.options.map(o => `<option value="${o}">${o}</option>`).join("");
  // category options are added later by fillCategories() once data is loaded
  return `<div class="fg"><label for="${f.id}">${f.label}</label><select id="${f.id}">${opts}</select></div>`;
}

function buildSidebar(){
  // Split filters into the always-visible basic set and the advanced set
  // that lives behind the "Show more options" toggle.
  const basic = FILTERS.filter(f => !f.adv).map(filterGroupHtml).join("");
  const adv   = FILTERS.filter(f =>  f.adv).map(filterGroupHtml).join("");
  document.getElementById("filters").innerHTML =
    basic
    + `<button type="button" id="more-toggle">Show more options ▾</button>`
    + `<div id="adv-filters" hidden>${adv}</div>`;

  // Any dropdown change re-applies all filters (advanced ones still apply
  // even while collapsed — they just default to "All").
  FILTERS.forEach(f => document.getElementById(f.id).addEventListener("change", applyFilters));

  // Expander toggle: show/hide the advanced group and flip the label.
  const box = document.getElementById("adv-filters");
  const btn = document.getElementById("more-toggle");
  btn.addEventListener("click", () => {
    box.hidden = !box.hidden;
    btn.textContent = box.hidden ? "Show more options ▾" : "Show fewer options ▴";
  });

  // Reset clears every filter (basic + advanced).
  document.getElementById("reset").addEventListener("click", () => {
    FILTERS.forEach(f => document.getElementById(f.id).value = "");
    applyFilters();
  });
}

// Populate the category dropdowns (Industry, Account Type, Account
// Strength) with the distinct values present in the data. A filter with
// an `order` array is sorted by that order (unknown values last);
// otherwise alphabetically. This is why those lists always match reality
// without being hardcoded.
function fillCategories(accounts){
  FILTERS.filter(f => f.type === "category").forEach(f => {
    const vals = [...new Set(accounts.map(a => String(a[f.field]==null?"":a[f.field]).trim()).filter(Boolean))];
    if(f.order)
      vals.sort((a,b) => ((f.order.indexOf(a)+1 || 1e9) - (f.order.indexOf(b)+1 || 1e9)) || a.localeCompare(b));
    else
      vals.sort();
    document.getElementById(f.id).insertAdjacentHTML("beforeend",
      vals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join(""));
  });
}

// ---- Does one account pass ALL active filters? ----------------------
// Returns false on the first filter it fails (filters combine with AND).
function matches(a){
  for(const f of FILTERS){
    const sel = document.getElementById(f.id).value;
    if(sel === "") continue;          // "All" selected -> this filter is inactive
    const raw = a[f.field];           // (unused by the derived type, which reads the whole account)
    if(f.type === "category"){
      if(String(raw==null?"":raw).trim() !== sel) return false;
    } else if(f.type === "count"){
      const n = valNum(raw) ?? 0;     // blank/non-numeric counts as 0
      if(sel === "5+"){ if(!(n >= 5)) return false; }
      else if(n !== Number(sel)) return false;
    } else if(f.type === "range"){
      const n = valNum(raw);
      if(n === null) return false;    // a non-numeric value matches no band, so it's filtered out
      const b = f.bands[Number(sel)];
      if(!(n >= b.min && n < b.max)) return false; // min inclusive, max exclusive
    } else if(f.type === "derived"){
      if(f.derive(a) !== sel) return false; // compare the computed label to the selection
    }
  }
  return true;
}

// ---- Leaflet map setup ----------------------------------------------
const map = L.map("map", { center:[51.13,-0.1], zoom:6 }); // initial view ~ South-East England
// CartoDB "light" tiles: free, keyless, muted basemap. {s}=subdomain,
// {z}/{x}/{y}=tile coords, {r}=@2x for retina screens.
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:19
}).addTo(map);
// All pins live in this one layer group, so a filter change can wipe and
// redraw them with a single clearLayers() call.
const markerLayer = L.layerGroup().addTo(map);

// ---- Resolve an account to a map position ---------------------------
// Coordinates only. Returns null if either lat or lng is missing or
// non-numeric, in which case the account simply isn't drawn.
function getPos(a){
  const lat = parseFloat(a[FIELD_LAT]), lng = parseFloat(a[FIELD_LNG]);
  if(!isNaN(lat) && !isNaN(lng)) return {lat,lng};
  return null;
}

// ---- Data fetch, render, filter -------------------------------------
let allAccounts = [];   // the full fetched set; filtering works on a copy of this

// Pull every Account via the Zoho SDK, 200 per page, until a short page
// signals the last one. Then drop any account without usable coordinates.
async function fetchAccounts(){
  let page=1,out=[];
  while(true){
    const r = await ZOHO.CRM.API.getAllRecords({Entity:"Accounts",per_page:200,page});
    const rows=(r&&r.data)||[]; out=out.concat(rows);
    if(rows.length<200) break; page++;
  }
  return out.filter(a=>
    a[FIELD_LAT]!=null && a[FIELD_LAT]!=="" && a[FIELD_LNG]!=null && a[FIELD_LNG]!=="");
}

// Sum each account's OPEN pipeline from the Deals module. Pulls all deals
// (200 per page), skips any whose Stage is closed (won/lost), and adds up
// Amount grouped by the deal's Account_Name lookup id. Returns a map of
// { accountId: openPipelineTotal }. Deals with no account link are ignored.
// NOTE: this fetches every deal once per load. Fine for small/medium orgs;
// for a large Deals table, prefer a CRM rollup-summary field instead (a
// SUM of Amount with a "Stage is none of the closed stages" criteria) and
// just read that field off the account — far lighter than this scan.
// Pull the Deals module once (200 per page) and group by the deal's
// Account_Name lookup id. For each account returns { openPipeline, deals }
// where openPipeline is the summed Amount of deals NOT in a closed stage,
// and deals is the list (name, stage, amount, date) used by the panel.
// Deals with no account link are ignored.
// NOTE: this fetches every deal once per load. Fine for small/medium orgs;
// for a large Deals table, prefer a CRM rollup-summary field for the
// pipeline sum and a related-records call for the per-account deal list.
async function fetchDealsByAccount(){
  const map = {};
  let page=1;
  while(true){
    const r = await ZOHO.CRM.API.getAllRecords({Entity:"Deals",per_page:200,page});
    const rows=(r&&r.data)||[];
    rows.forEach(d=>{
      const acc = d[FIELD_DEAL_ACCOUNT];                        // lookup object: { id, name }
      const id = acc && acc.id;
      if(!id) return;                                           // deal not linked to an account
      const m = map[id] || (map[id] = { openPipeline:0, deals:[] });
      const stage = d[FIELD_DEAL_STAGE];
      const amount = Number(d[FIELD_DEAL_AMOUNT]) || 0;
      m.deals.push({ id:d.id, name:d[FIELD_DEAL_NAME], stage, amount, date:d[FIELD_DEAL_DATE] });
      if(!CLOSED_STAGES.includes(stage)) m.openPipeline += amount;   // open deals only
    });
    if(rows.length<200) break; page++;
  }
  return map;
}

// Wipe existing pins and draw one per account that has a position.
function renderMarkers(accounts){
  markerLayer.clearLayers();
  accounts.forEach(a=>{
    const pos=getPos(a); if(!pos) return;
    const m = L.marker([pos.lat,pos.lng],{icon:pinIcon(colorForPipeline(a._openPipeline))});
    // Hover tooltip: name, full billing address (if present), open-deal count.
    const addr = addressStr(a);
    m.bindTooltip(`<b>${esc(a[FIELD_NAME])}</b>${addr ? `<br>${addr}` : ""}<br>Open deals: ${openDealCount(a)}`,
      { direction:"top", offset:[0,-34], opacity:0.95 });
    // Click opens the right-hand detail panel for this account.
    m.on("click", () => openDetail(a));
    m.addTo(markerLayer);
  });
}

// The reactive core: filter the full set, redraw, update the count.
// Runs on first load and on every dropdown change.
function applyFilters(){
  const filtered = allAccounts.filter(matches);
  renderMarkers(filtered);
  document.getElementById("count").textContent = filtered.length;
}

// ---- Lifecycle ------------------------------------------------------
// Registered before init(). The SDK fires "PageLoad" once it has finished
// the handshake with Zoho and the CRM session is available.
ZOHO.embeddedApp.on("PageLoad", async () => {
  try{
    buildSidebar();                            // 1. render the (mostly empty) dropdowns
    setStatus("Loading accounts…");
    allAccounts = await fetchAccounts();       // 2. pull the data from the CRM
    fillCategories(allAccounts);               // 3. fill Industry/Account Type options from the data

    // 3b. Sum each account's open-pipeline value from the Deals module,
    //     then attach it to every account (drives pin colour + popup).
    // 3b. Pull deals once, then attach each account's open-pipeline value
    //     and its deal list (drives pin colour, tooltip, and detail panel).
    setStatus("Loading deals…");
    const dealsByAcc = await fetchDealsByAccount();
    allAccounts.forEach(a => {
      const m = dealsByAcc[a.id];
      a._openPipeline = m ? m.openPipeline : 0;
      a._deals = m ? m.deals : [];
    });

    applyFilters();                            // 4. first draw (no filters selected = everything)

    // 5. Zoom to contain all plottable accounts — done ONCE on load so
    //    later filtering doesn't keep jerking the viewport around.
    const pts=[]; allAccounts.forEach(a=>{const p=getPos(a); if(p) pts.push([p.lat,p.lng]);});
    if(pts.length){ map.fitBounds(pts,{padding:[30,30]}); hideStatus(); }
    else setStatus(`Loaded ${allAccounts.length} records, but none had coordinates to plot.`,true);
  }catch(e){ setStatus("Failed: "+e.message,true); console.error(e); } // surface any error in the status box
});

// Kicks off the whole thing: start the SDK handshake, which eventually
// triggers the PageLoad handler above. Nothing runs until this resolves.
ZOHO.embeddedApp.init();
</script>
</body>
</html>
